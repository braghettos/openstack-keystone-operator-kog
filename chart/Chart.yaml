apiVersion: v2
name: openstack-keystone-operator-kog
description: |
  Krateo Operator Generator (KOG) packaging that turns OpenStack Keystone
  identity resources (projects, users, roles, groups, domains, role
  assignments and application credentials) into native Kubernetes custom
  resources, driven by oasgen-provider + rest-dynamic-controller.
