  - identity
  - security
  - operator
home: https://github.com/braghettos/openstack-keystone-operator-kog
sources:
  - https://github.com/braghettos/openstack-keystone-operator-kog
maintainers:
  - name: braghettos
icon: https://www.openstack.org/themes/openstack/images/project-mascots/Keystone/OpenStack_Project_Keystone_vertical.png
annotations:
  krateo.io/category: security
  krateo.io/display-name: OpenStack Keystone KOG
  krateo.io/maturity: beta
  krateoSupportedVersion: ">= 2.5.1"
