openapi: 3.0.3
info:
  title: OpenStack Identity (Keystone) v3 - Groups (KOG-friendly subset)
  description: |
    Hand-crafted OpenAPI 3.0 subset of the Keystone v3 Identity API covering the
    Group lifecycle (create / get / update / delete). Keystone wraps the payload
    in a `group` envelope, so the CR uses `spec.group.*`; the CRD Kind is
    `IdentityGroup`. The envelope schemas are inlined (not $ref'd) so crdgen
    derives the nested types directly. Paths are relative to the identity base (.../v3).
  version: "3.0"
servers:
  - url: {{ include "openstack-keystone-operator-kog.authBridgeUrl" . }}
    description: In-cluster Keystone-auth proxy
components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
security:
  - bearer: []
paths:
  /groups:
    post:
      operationId: createGroup
      summary: Create a group
      tags: [groups]
      security:
        - bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [group]
              properties:
                group:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                    domain_id:
                      type: string
                    description:
                      type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  group:
                    type: object
                    properties:
                      id: { type: string }
                      name: { type: string }
                      domain_id: { type: string }
                      description: { type: string }
  /groups/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getGroup
      summary: Show group details
      tags: [groups]
      security:
        - bearer: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  group:
                    type: object
                    properties:
                      id: { type: string }
                      name: { type: string }
                      domain_id: { type: string }
                      description: { type: string }
    patch:
      operationId: updateGroup
      summary: Update a group
      tags: [groups]
      security:
        - bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [group]
              properties:
                group:
                  type: object
                  properties:
                    name: { type: string }
                    description: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  group:
                    type: object
                    properties:
                      id: { type: string }
                      name: { type: string }
    delete:
      operationId: deleteGroup
      summary: Delete a group
      tags: [groups]
      security:
        - bearer: []
      responses:
        '204':
          description: Deleted
