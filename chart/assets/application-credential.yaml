openapi: 3.0.3
info:
  title: OpenStack Identity (Keystone) v3 - Application Credentials (KOG-friendly subset)
  description: |
    Create / get / delete an application credential for a user. Application
    credentials are immutable (no update) and are the production answer to the
    expiring-bearer-token problem the other KOG operators hit: an app credential
    can be long-lived and scoped to specific roles. Keystone wraps the payload in
    an `application_credential` envelope (`spec.application_credential.*`); the
    `user_id` is a path segment carried in `spec.user_id`. The CRD Kind is
    `IdentityApplicationCredential`. Paths are relative to the identity base (.../v3).

    NOTE: the create POST body must be `{application_credential:{...}}`; KOG sends
    the whole spec, so `user_id` is also sent as a sibling. Keystone reads
    `body['application_credential']` and tolerates the extra key in practice, but
    if a stricter Keystone rejects it, this needs a KOG exclude-from-body mapping
    (same caveat as Nova's quota set).
  version: "3.0"
servers:
  - url: {{ include "openstack-keystone-operator-kog.authBridgeUrl" . }}
    description: In-cluster Keystone-auth proxy
components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
  schemas:
    AppCredRole:
      type: object
      properties:
        name:
          type: string
        id:
          type: string
    AppCredSpec:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        secret:
          type: string
          description: Optional caller-supplied secret; Keystone generates one if omitted.
        expires_at:
          type: string
        unrestricted:
          type: boolean
        roles:
          type: array
          items:
            $ref: '#/components/schemas/AppCredRole'
    AppCredCreateRequest:
      type: object
      required:
        - user_id
        - application_credential
      properties:
        user_id:
          type: string
          description: Owning user ID (path parameter).
        application_credential:
          $ref: '#/components/schemas/AppCredSpec'
    AppCredSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        secret:
          type: string
        project_id:
          type: string
        expires_at:
          type: string
    AppCredEnvelope:
      type: object
      properties:
        application_credential:
          $ref: '#/components/schemas/AppCredSummary'
security:
  - bearer: []
paths:
  /users/{user_id}/application_credentials:
    parameters:
      - { name: user_id, in: path, required: true, schema: { type: string } }
    post:
      operationId: createAppCred
      summary: Create an application credential
      tags: [application-credentials]
      security:
        - bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppCredCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppCredEnvelope'
  /users/{user_id}/application_credentials/{id}:
    parameters:
      - { name: user_id, in: path, required: true, schema: { type: string } }
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      operationId: getAppCred
      summary: Show application credential details
      tags: [application-credentials]
      security:
        - bearer: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppCredEnvelope'
    delete:
      operationId: deleteAppCred
      summary: Delete an application credential
      tags: [application-credentials]
      security:
        - bearer: []
      responses:
        '204':
          description: Deleted
