openapi: 3.0.3
info:
  title: OpenStack Identity (Keystone) v3 - Projects (KOG-friendly subset)
  description: |
    Hand-crafted OpenAPI 3.0 subset of the Keystone v3 Identity API covering the
    Project lifecycle (create / get / update / delete). Keystone wraps the payload
    in a `project` envelope, so the CR uses `spec.project.*`; the CRD Kind is
    `IdentityProject` to avoid colliding with that envelope property in crdgen.
    Paths are relative to the identity endpoint base (.../v3), which the
    auth-bridge proxy forwards to.
  version: "3.0"
servers:
  - url: {{ include "openstack-keystone-operator-kog.authBridgeUrl" . }}
    description: In-cluster Keystone-auth proxy
components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
  schemas:
    ProjectSpec:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        domain_id:
          type: string
          description: Owning domain ID (default 'default').
        description:
          type: string
        enabled:
          type: boolean
        parent_id:
          type: string
        is_domain:
          type: boolean
    ProjectCreateRequest:
      type: object
      required:
        - project
      properties:
        project:
          $ref: '#/components/schemas/ProjectSpec'
    ProjectSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        domain_id:
          type: string
        enabled:
          type: boolean
        description:
          type: string
    ProjectEnvelope:
      type: object
      properties:
        project:
          $ref: '#/components/schemas/ProjectSummary'
security:
  - bearer: []
paths:
  /projects:
    post:
      operationId: createProject
      summary: Create a project
      tags: [projects]
      security:
        - bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
  /projects/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getProject
      summary: Show project details
      tags: [projects]
      security:
        - bearer: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
    patch:
      operationId: updateProject
      summary: Update a project
      tags: [projects]
      security:
        - bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
    delete:
      operationId: deleteProject
      summary: Delete a project
      tags: [projects]
      security:
        - bearer: []
      responses:
        '204':
          description: Deleted
