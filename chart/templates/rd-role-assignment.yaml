{{- if .Values.restdefinitions.role_assignment.enabled }}
apiVersion: ogen.krateo.io/v1alpha1
kind: RestDefinition
metadata:
  name: {{ .Release.Name }}-role-assignment
  labels:
    {{- include "openstack-keystone-operator-kog.labels" . | nindent 4 }}
spec:
  oasPath: configmap://{{ .Release.Namespace }}/{{ .Release.Name }}-role-assignment/roleassignment.yaml
  resourceGroup: {{ .Values.restdefinitions.role_assignment.resourceGroup }}
  resource:
    # A role grant is an idempotent action on a composite path. findby on the
    # flat /role_assignments list never cleanly matches the composite, so create
    # (PUT) fires; PUT is idempotent so a re-fire is a harmless no-op.
    kind: {{ .Values.restdefinitions.role_assignment.resourceKind }}
    identifiers:
      - project_id
      - user_id
      - role_id
    verbsDescription:
      - action: findby
        method: GET
        path: /role_assignments
        identifiersMatchPolicy: AND
      - action: create
        method: PUT
        path: /projects/{project_id}/users/{user_id}/roles/{role_id}
        requestFieldMapping:
          - inPath: project_id
            inCustomResource: spec.project_id
          - inPath: user_id
            inCustomResource: spec.user_id
          - inPath: role_id
            inCustomResource: spec.role_id
      - action: delete
        method: DELETE
        path: /projects/{project_id}/users/{user_id}/roles/{role_id}
        requestFieldMapping:
          - inPath: project_id
            inCustomResource: spec.project_id
          - inPath: user_id
            inCustomResource: spec.user_id
          - inPath: role_id
            inCustomResource: spec.role_id
{{- end }}
