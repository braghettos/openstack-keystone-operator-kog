{{- if .Values.restdefinitions.application_credential.enabled }}
apiVersion: ogen.krateo.io/v1alpha1
kind: RestDefinition
metadata:
  name: {{ .Release.Name }}-application-credential
  labels:
    {{- include "openstack-keystone-operator-kog.labels" . | nindent 4 }}
spec:
  oasPath: configmap://{{ .Release.Namespace }}/{{ .Release.Name }}-application-credential/appcredential.yaml
  resourceGroup: {{ .Values.restdefinitions.application_credential.resourceGroup }}
  resource:
    # App credentials are immutable (no update). The path needs the owning
    # user_id (from spec) plus the created id (from status).
    kind: {{ .Values.restdefinitions.application_credential.resourceKind }}
    identifiers:
      - application_credential.id
      - application_credential.name
    additionalStatusFields:
      - application_credential.id
      - application_credential.project_id
    verbsDescription:
      - action: create
        method: POST
        path: /users/{user_id}/application_credentials
        requestFieldMapping:
          - inPath: user_id
            inCustomResource: spec.user_id
      - action: get
        method: GET
        path: /users/{user_id}/application_credentials/{id}
        requestFieldMapping:
          - inPath: user_id
            inCustomResource: spec.user_id
          - inPath: id
            inCustomResource: status.application_credential.id
      - action: delete
        method: DELETE
        path: /users/{user_id}/application_credentials/{id}
        requestFieldMapping:
          - inPath: user_id
            inCustomResource: spec.user_id
          - inPath: id
            inCustomResource: status.application_credential.id
{{- end }}
