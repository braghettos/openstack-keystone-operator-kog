name: release-chart

# Publishes the chart to oci://ghcr.io/<owner>/charts/<name> on a SemVer tag (matching
# Chart.yaml version) or manual dispatch. The CompositionDefinition's spec.chart.url
# points at that artifact. helm package does not render templates, so charts requiring
# runtime input still publish; helm lint validates the chart + its values.schema.json.

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  HELM_VERSION: v3.19.0
  CHART_DIR: chart

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: helm lint
        run: helm lint "$CHART_DIR"

      - name: Verify git tag matches Chart.yaml version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="$GITHUB_REF_NAME"
          cv="$(awk '/^version:/ {print $2; exit}' "$CHART_DIR/Chart.yaml")"
          if [ "$tag" != "$cv" ]; then
            echo "::error::git tag '$tag' does not match Chart.yaml version '$cv'"
            exit 1
          fi

      - name: helm package
        run: helm package "$CHART_DIR" --destination dist

      - name: helm registry login (GHCR)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: helm push (retry on GHCR first-push flakiness)
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          for tgz in dist/*.tgz; do
            ok=0
            for attempt in 1 2 3 4 5; do
              helm push "$tgz" "oci://ghcr.io/${owner}/charts" && { ok=1; break; }
              echo "push attempt $attempt failed (GHCR flakiness); retrying in 10s"
              sleep 10
            done
            [ "$ok" = 1 ] || { echo "::error::push of $tgz failed after 5 attempts"; exit 1; }
          done
